	倒计时：

</div>

<script>
console.log("看你妈的源文件");

let height = window.screen.height;
let width = window.screen.width;

setInterval(main,50);

function main(){

	let now=new Date();

	//console.log(now);

	let y=now.getFullYear();//年
	let month=now.getMonth()+1;   //月
	let d=now.getDate();     //天
	let h=now.getHours();   //小时
	let m=now.getMinutes(); //分
	let s=now.getSeconds(); //秒

	m=checkTime(m);// 在小于10的数字前加一个'0'
	s=checkTime(s);// 在小于10的数字前加一个'0'

	document.getElementById('now').innerHTML=y+"年 "+month+"月 "+d+"日 "+h+"点 "+m+"分 "+s+"秒 ";

	let fuckTime = new Date(y,month-1,d,18,0,0);

	//Date.now() 当前时间的时间戳
	let target_s = parseInt((fuckTime-Date.now())/(1000));
	let target_m = target_s/60;
	let target_h = target_m/60;



	document.getElementById('h').innerHTML = Math.round(target_h,2);
	document.getElementById('m').innerHTML = Math.round(target_m,2);
	document.getElementById('s').innerHTML = Math.round(target_s,2);
	document.getElementById('s2').innerHTML = Math.round(target_s,2)+'秒';

	//document.getElementById("all").innerHTML;

}


function checkTime(i){
	if (i<10){
		i="0" + i;
	}
	return i;
}
